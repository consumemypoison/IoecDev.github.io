<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Panel – MavTr3nT</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  :root{--bg:#0c0c0c;--card:#141414;--border:#1e1e1e;--green:#4ade80;--green-glow:rgba(74,222,128,.12);--gold:#fbbf24;--muted:#525252;--text:#a3a3a3;--white:#f5f5f5;--red:#f87171;--yellow:#fbbf24;}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;font-size:15px;line-height:1.7;overflow-x:hidden;padding-bottom:120px;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(74,222,128,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(74,222,128,.025) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0;}
  .pixel-snow-container{position:fixed;inset:0;width:100%;height:100%;overflow:hidden;z-index:1;pointer-events:none;contain:layout style paint;}
  .pixel-snow-container canvas{display:block;width:100%;height:100%;transform:translateZ(0);will-change:transform;backface-visibility:hidden;}
  nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:1.1rem 2rem;background:rgba(12,12,12,.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);}
  .nav-logo{display:flex;align-items:center;gap:.55rem;font-weight:700;font-size:.95rem;color:var(--white);text-decoration:none;}
  .nav-dot{width:8px;height:8px;background:var(--green);border-radius:50%;box-shadow:0 0 8px var(--green);animation:pulse 2s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 8px var(--green);}50%{opacity:.4;box-shadow:0 0 3px var(--green);}}
  .nav-links{display:flex;gap:1.8rem;list-style:none;}
  .nav-links a{color:var(--muted);text-decoration:none;font-size:.88rem;font-weight:500;transition:color .2s;}
  .nav-links a:hover{color:var(--white);}
  .page{position:relative;z-index:2;max-width:520px;margin:0 auto;padding:2rem 1.5rem;}
  .section-label{font-size:.72rem;font-weight:500;color:var(--green);letter-spacing:2px;text-transform:uppercase;margin-bottom:1.6rem;font-family:'Fira Code',monospace;}
  ::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

  /* Login */
  #login-view, #panel-view{transition:opacity .3s;}
  .login-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:2rem;}
  .login-title{font-size:1.4rem;font-weight:700;color:var(--white);margin-bottom:.4rem;}
  .login-sub{font-size:.85rem;color:var(--muted);margin-bottom:1.8rem;}
  .field{margin-bottom:1rem;}
  .field label{display:block;font-size:.78rem;font-weight:600;color:var(--muted);margin-bottom:.4rem;text-transform:uppercase;letter-spacing:.5px;}
  .field input{width:100%;background:#0f0f0f;border:1px solid var(--border);border-radius:8px;padding:.65rem .9rem;font-family:'Outfit',sans-serif;font-size:.9rem;color:var(--white);outline:none;transition:border-color .2s;}
  .field input:focus{border-color:rgba(74,222,128,.4);}
  .btn-login{width:100%;padding:.75rem;background:var(--green);color:#0c0c0c;font-family:'Outfit',sans-serif;font-size:.9rem;font-weight:700;border:none;border-radius:8px;cursor:pointer;transition:opacity .15s,transform .15s;margin-top:.5rem;}
  .btn-login:hover{opacity:.88;transform:translateY(-1px);}
  .btn-login:active{transform:none;}
  .login-error{font-size:.82rem;color:var(--red);margin-top:.75rem;text-align:center;min-height:1.2em;}

  /* Panel */
  .panel-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:2rem;margin-bottom:1.2rem;}
  .panel-title{font-size:1.1rem;font-weight:700;color:var(--white);margin-bottom:1.2rem;display:flex;align-items:center;gap:.6rem;}
  .panel-title-icon{font-size:1.1rem;}

  /* Status picker */
  .status-picker{display:flex;gap:.6rem;margin-bottom:1.2rem;}
  .status-btn{flex:1;padding:.6rem .5rem;border-radius:10px;border:2px solid transparent;cursor:pointer;font-family:'Outfit',sans-serif;font-size:.82rem;font-weight:700;transition:all .15s;text-align:center;}
  .status-btn.green{background:rgba(74,222,128,.08);color:#4ade80;border-color:rgba(74,222,128,.2);}
  .status-btn.green.selected, .status-btn.green:hover{background:rgba(74,222,128,.18);border-color:#4ade80;}
  .status-btn.yellow{background:rgba(251,191,36,.08);color:#fbbf24;border-color:rgba(251,191,36,.2);}
  .status-btn.yellow.selected, .status-btn.yellow:hover{background:rgba(251,191,36,.18);border-color:#fbbf24;}
  .status-btn.red{background:rgba(248,113,113,.08);color:#f87171;border-color:rgba(248,113,113,.2);}
  .status-btn.red.selected, .status-btn.red:hover{background:rgba(248,113,113,.18);border-color:#f87171;}

  .field textarea{width:100%;background:#0f0f0f;border:1px solid var(--border);border-radius:8px;padding:.65rem .9rem;font-family:'Outfit',sans-serif;font-size:.88rem;color:var(--white);outline:none;transition:border-color .2s;resize:vertical;min-height:80px;line-height:1.6;}
  .field textarea:focus{border-color:rgba(74,222,128,.4);}
  .char-count{font-size:.72rem;color:var(--muted);text-align:right;margin-top:.3rem;font-family:'Fira Code',monospace;}

  .btn-save{width:100%;padding:.75rem;background:var(--green);color:#0c0c0c;font-family:'Outfit',sans-serif;font-size:.9rem;font-weight:700;border:none;border-radius:8px;cursor:pointer;transition:opacity .15s,transform .15s;}
  .btn-save:hover{opacity:.88;transform:translateY(-1px);}
  .btn-save:disabled{opacity:.5;cursor:not-allowed;transform:none;}
  .save-feedback{font-size:.82rem;text-align:center;min-height:1.2em;margin-top:.6rem;transition:opacity .3s;}
  .save-feedback.ok{color:var(--green);}
  .save-feedback.err{color:var(--red);}

  /* Current preview */
  .current-preview{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:10px;padding:1rem;margin-bottom:1.2rem;}
  .preview-label{font-size:.68rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;font-family:'Fira Code',monospace;margin-bottom:.6rem;}
  .preview-badge{display:inline-flex;align-items:center;gap:.5rem;font-size:.8rem;font-weight:700;padding:.3rem .85rem;border-radius:999px;border:1px solid;margin-bottom:.5rem;}
  .preview-dot{width:7px;height:7px;border-radius:50%;animation:pulse 2s infinite;}
  .preview-msg{font-size:.82rem;color:var(--muted);font-style:italic;}

  /* Logout */
  .btn-logout{background:transparent;border:1px solid var(--border);color:var(--muted);padding:.5rem 1rem;border-radius:8px;cursor:pointer;font-family:'Outfit',sans-serif;font-size:.82rem;transition:all .15s;}
  .btn-logout:hover{border-color:var(--red);color:var(--red);}

  /* History clear */
  .btn-danger{background:transparent;border:1px solid rgba(248,113,113,.3);color:var(--red);padding:.5rem 1rem;border-radius:8px;cursor:pointer;font-family:'Outfit',sans-serif;font-size:.82rem;transition:all .15s;width:100%;}
  .btn-danger:hover{background:rgba(248,113,113,.08);}

  /* DOCK */
  .dock-wrapper{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:999;}
  .dock-panel{display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(20,20,20,0.88);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,0.08);border-radius:20px;box-shadow:0 8px 40px rgba(0,0,0,.7);}
  .dock-item{position:relative;width:50px;height:50px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.09);border-radius:14px;cursor:pointer;transition:transform .18s cubic-bezier(.4,0,.2,1),background .15s;flex-shrink:0;text-decoration:none;color:var(--white);}
  .dock-item:hover{background:rgba(255,255,255,0.11);transform:translateY(-8px);}
  .dock-item.active{background:rgba(74,222,128,0.1);border-color:rgba(74,222,128,0.3);}
  .dock-item svg{width:22px;height:22px;stroke:#c0c0c0;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;transition:stroke .15s;pointer-events:none;}
  .dock-item.active svg{stroke:var(--green);}
  .dock-item:hover svg{stroke:#fff;}
  .dock-label{position:absolute;bottom:calc(100% + 10px);left:50%;background:rgba(18,18,18,0.97);border:1px solid rgba(255,255,255,0.1);color:var(--white);font-size:.72rem;font-weight:600;padding:.3rem .75rem;border-radius:8px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s,transform .15s;transform:translateX(-50%) translateY(5px);}
  .dock-item:hover .dock-label{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="pixel-snow-container" id="snow-bg"></div>

<nav>
  <a class="nav-logo" href="index.html"><span class="nav-dot"></span>MavTr3nT</a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="status.html">Status</a></li>
    <li><a href="projects.html">Projects</a></li>
  </ul>
</nav>

<div class="page">

  <!-- LOGIN VIEW -->
  <div id="login-view">
    <p class="section-label">// panel access</p>
    <div class="login-card">
      <div class="login-title">🔐 Admin Panel</div>
      <div class="login-sub">Enter your credentials to access the status panel.</div>
      <div class="field">
        <label>Username</label>
        <input type="text" id="input-user" autocomplete="off" spellcheck="false" placeholder="Username"/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="input-pass" placeholder="Password"/>
      </div>
      <button class="btn-login" id="btn-login">Sign In</button>
      <div class="login-error" id="login-error"></div>
    </div>
  </div>

  <!-- PANEL VIEW (hidden until logged in) -->
  <div id="panel-view" style="display:none;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;">
      <p class="section-label" style="margin-bottom:0;">// control panel</p>
      <button class="btn-logout" id="btn-logout">Sign out</button>
    </div>

    <!-- Current status preview -->
    <div class="panel-card">
      <div class="panel-title"><span class="panel-title-icon">📡</span> Current Status</div>
      <div class="current-preview">
        <div class="preview-label">Live preview</div>
        <div class="preview-badge" id="preview-badge">
          <span class="preview-dot" id="preview-dot"></span>
          <span id="preview-label-text">—</span>
        </div>
        <div class="preview-msg" id="preview-msg-text">No message set.</div>
      </div>

      <!-- Status level picker -->
      <div class="field">
        <label>Availability</label>
        <div class="status-picker">
          <button class="status-btn green selected" data-level="green">🟢 Open</button>
          <button class="status-btn yellow" data-level="yellow">🟡 Busy-ish</button>
          <button class="status-btn red" data-level="red">🔴 Unavailable</button>
        </div>
      </div>

      <!-- Custom label -->
      <div class="field">
        <label>Status Label</label>
        <input type="text" id="input-label" maxlength="60" placeholder="e.g. Available for work"/>
      </div>

      <!-- Status message -->
      <div class="field">
        <label>Status Message</label>
        <textarea id="input-message" maxlength="280" placeholder="What are you working on? (optional)"></textarea>
        <div class="char-count"><span id="char-count">0</span>/280</div>
      </div>

      <button class="btn-save" id="btn-save">💾 Save Status</button>
      <div class="save-feedback" id="save-feedback"></div>
    </div>

    <!-- Danger zone -->
    <div class="panel-card">
      <div class="panel-title"><span class="panel-title-icon">🗑️</span> History</div>
      <p style="font-size:.85rem;color:var(--muted);margin-bottom:1rem;">Clear all saved status history from the Status page.</p>
      <button class="btn-danger" id="btn-clear-history">Clear Status History</button>
    </div>
  </div>

</div>

<!-- DOCK -->
<div class="dock-wrapper">
  <div class="dock-panel">
    <a href="index.html" class="dock-item"><svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg><span class="dock-label">Home</span></a>
    <a href="status.html" class="dock-item"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg><span class="dock-label">Status</span></a>
    <a href="projects.html" class="dock-item"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg><span class="dock-label">Projects</span></a>
    <a href="panel.html" class="dock-item active"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07M8.46 8.46a5 5 0 0 0 0 7.07"/></svg><span class="dock-label">Panel</span></a>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════
//  FIREBASE CONFIG — paste your Realtime Database URL here
// ════════════════════════════════════════════════════════
const FIREBASE_URL = 'https://YOUR-PROJECT-ID-default-rtdb.firebaseio.com';

// ── SHA-256 login (credentials stay in your browser only) ──
async function sha256(str){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
// Hash of "MavTr3nT:73334200Aa@Mav"
const CRED_HASH='59608bfe65805aa888b086294eab3a8a04c7968998b79e55c7c05d22f1ae90c4b';
const SESSION_KEY='panel_session';

async function checkLogin(user,pass){
  const hash=await sha256(user+':'+pass);
  return hash===CRED_HASH;
}
function isLoggedIn(){return sessionStorage.getItem(SESSION_KEY)==='authenticated';}
function setLoggedIn(){sessionStorage.setItem(SESSION_KEY,'authenticated');}
function logout(){
  sessionStorage.removeItem(SESSION_KEY);
  document.getElementById('panel-view').style.display='none';
  document.getElementById('login-view').style.display='block';
  document.getElementById('input-user').value='';
  document.getElementById('input-pass').value='';
  document.getElementById('login-error').textContent='';
}

// ── Status colors ──
const STATUS_COLORS={
  green:{bg:'rgba(74,222,128,.12)',border:'rgba(74,222,128,.28)',col:'#4ade80'},
  yellow:{bg:'rgba(251,191,36,.1)',border:'rgba(251,191,36,.28)',col:'#fbbf24'},
  red:{bg:'rgba(248,113,113,.1)',border:'rgba(248,113,113,.28)',col:'#f87171'}
};
let selectedLevel='green';

function updatePreview(){
  const label=document.getElementById('input-label').value||'Available for work';
  const msg=document.getElementById('input-message').value;
  const s=STATUS_COLORS[selectedLevel];
  const badge=document.getElementById('preview-badge');
  const dot=document.getElementById('preview-dot');
  badge.style.background=s.bg;badge.style.borderColor=s.border;badge.style.color=s.col;
  dot.style.background=s.col;dot.style.boxShadow=`0 0 6px ${s.col}`;
  document.getElementById('preview-label-text').textContent=label;
  const msgEl=document.getElementById('preview-msg-text');
  msgEl.textContent=msg?msg:'No message set.';
  msgEl.style.fontStyle=msg?'normal':'italic';
}

async function loadCurrentIntoPanel(){
  try {
    const res=await fetch(`${FIREBASE_URL}/status.json`);
    const data=await res.json();
    if(data){
      selectedLevel=data.level||'green';
      document.querySelectorAll('.status-btn').forEach(b=>{
        b.classList.toggle('selected',b.dataset.level===selectedLevel);
      });
      document.getElementById('input-label').value=data.label||'';
      document.getElementById('input-message').value=data.message||'';
      document.getElementById('char-count').textContent=(data.message||'').length;
    }
  } catch(e){}
  updatePreview();
}

function showPanel(){
  document.getElementById('login-view').style.display='none';
  document.getElementById('panel-view').style.display='block';
  loadCurrentIntoPanel();
}

// ── Login ──
document.getElementById('btn-login').addEventListener('click',async()=>{
  const user=document.getElementById('input-user').value.trim();
  const pass=document.getElementById('input-pass').value;
  const errEl=document.getElementById('login-error');
  errEl.textContent='';
  if(!user||!pass){errEl.textContent='Please fill in both fields.';return;}
  const ok=await checkLogin(user,pass);
  if(ok){setLoggedIn();showPanel();}
  else{errEl.textContent='Incorrect username or password.';}
});

['input-user','input-pass'].forEach(id=>{
  document.getElementById(id).addEventListener('keydown',e=>{
    if(e.key==='Enter')document.getElementById('btn-login').click();
  });
});

// ── Logout ──
document.getElementById('btn-logout').addEventListener('click',logout);

// ── Status level buttons ──
document.querySelectorAll('.status-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    selectedLevel=btn.dataset.level;
    document.querySelectorAll('.status-btn').forEach(b=>b.classList.remove('selected'));
    btn.classList.add('selected');
    updatePreview();
  });
});

// ── Label/message inputs ──
document.getElementById('input-label').addEventListener('input',updatePreview);
document.getElementById('input-message').addEventListener('input',function(){
  document.getElementById('char-count').textContent=this.value.length;
  updatePreview();
});

// ── Save to Firebase ──
document.getElementById('btn-save').addEventListener('click',async()=>{
  const label=document.getElementById('input-label').value.trim()||'Available for work';
  const message=document.getElementById('input-message').value.trim();
  const now=new Date().toISOString();
  const data={level:selectedLevel,label,message,updated:now};
  const btn=document.getElementById('btn-save');
  const fb=document.getElementById('save-feedback');

  btn.disabled=true;
  fb.textContent='Saving…';
  fb.className='save-feedback';

  try {
    // Save current status
    await fetch(`${FIREBASE_URL}/status.json`,{
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(data)
    });

    // Append to history (max 20 entries)
    const histRes=await fetch(`${FIREBASE_URL}/history.json`);
    let hist=await histRes.json();
    if(!Array.isArray(hist))hist=[];
    hist.push(data);
    if(hist.length>20)hist.shift();
    await fetch(`${FIREBASE_URL}/history.json`,{
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(hist)
    });

    fb.textContent='✓ Status saved and live!';
    fb.className='save-feedback ok';
  } catch(e){
    fb.textContent='✗ Save failed — check your Firebase URL or connection.';
    fb.className='save-feedback err';
  }

  btn.disabled=false;
  setTimeout(()=>{fb.textContent='';fb.className='save-feedback';},3000);
});

// ── Clear history ──
document.getElementById('btn-clear-history').addEventListener('click',async()=>{
  if(confirm('Clear all status history?')){
    try {
      await fetch(`${FIREBASE_URL}/history.json`,{
        method:'PUT',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify([])
      });
      const fb=document.getElementById('save-feedback');
      fb.textContent='✓ History cleared.';
      fb.className='save-feedback ok';
      setTimeout(()=>{fb.textContent='';fb.className='save-feedback';},2500);
    } catch(e){}
  }
});

// ── Auto-restore session ──
if(isLoggedIn())showPanel();
</script>

<script>

(function(){

#define PI_OVER_6 0.5235988
#define PI_OVER_3 1.0471976
#define M1 1597334677U
#define M2 3812015801U

const vec3 camK=vec3(0.57735027,0.57735027,0.57735027);const vec3 camI=vec3(0.70710678,0.0,-0.70710678);const vec3 camJ=vec3(-0.40824829,0.81649658,-0.40824829);const vec2 b1d=vec2(0.574,0.819);
vec3 hash3(uint n){uvec3 h=hsh(n)*uvec3(1U,511U,262143U);return vec3(h)*F0;}
float snowflakeDist(vec2 p){float r=length(p);float a=atan(p.y,p.x);a=abs(mod(a+PI_OVER_6,PI_OVER_3)-PI_OVER_6);vec2 q=r*vec2(cos(a),sin(a));float dM=max(abs(q.y),max(-q.x,q.x-1.0));float b1t=clamp(dot(q-vec2(0.4,0.0),b1d),0.0,0.4);float dB1=length(q-vec2(0.4,0.0)-b1t*b1d);float b2t=clamp(dot(q-vec2(0.7,0.0),b1d),0.0,0.25);float dB2=length(q-vec2(0.7,0.0)-b2t*b1d);return min(dM,min(dB1,dB2))*10.0;}
void main(){float iP=1.0/uPixelResolution;float ps=max(1.0,floor(0.5+uResolution.x*iP));float ips=1.0/ps;vec2 fc=floor(gl_FragCoord.xy*ips);vec2 res=uResolution*ips;float iRX=1.0/res.x;vec3 ray=normalize(vec3((fc-res*0.5)*iRX,1.0));ray=ray.x*camI+ray.y*camJ+ray.z*camK;float ts=uTime*uSpeed;float wX=cos(uDirection)*0.4;float wY=sin(uDirection)*0.4;vec3 cPos=(wX*camI+wY*camJ+0.1*camK)*ts;vec3 pos=cPos;vec3 aR=max(abs(ray),vec3(0.001));vec3 st=1.0/aR;vec3 rS=step(ray,vec3(0.0));vec3 ph=fract(pos)*st;ph=mix(st-ph,ph,rS);float rDK=dot(ray,camK);float iRDK=1.0/rDK;float iDF=1.0/uDepthFade;float hIRX=0.5*iRX;vec3 tA=ts*0.1*vec3(7.0,8.0,5.0);float t=0.0;for(int i=0;i<128;i++){if(t>=uFarPlane)break;vec3 fp=floor(pos);uint cc=coord3(fp);float ch=hash3(cc).x;if(ch<uDensity){vec3 h=hash3(cc);vec3 s1=fp.yzx*0.073;vec3 s2=fp.zxy*0.27;vec3 fP=0.5-0.5*cos(4.0*sin(s1)+4.0*sin(s2)+2.0*h+tA);fP=fP*0.8+0.1+fp;float tI=dot(fP-pos,camK)*iRDK;if(tI>0.0){vec3 tP=pos+ray*tI-fP;float tX=dot(tP,camI);float tY=dot(tP,camJ);vec2 tUV=abs(vec2(tX,tY));float dep=dot(fP-cPos,camK);float fs=max(uFlakeSize,uMinFlakeSize*dep*hIRX);float dist;if(uVariant<0.5){dist=max(tUV.x,tUV.y);}else if(uVariant<1.5){dist=length(tUV);}else{dist=snowflakeDist(vec2(tX,tY)/fs)*fs;}if(dist<fs){float fr=uFlakeSize/fs;float intensity=exp2(-(t+tI)*iDF)*min(1.0,fr*fr)*uBrightness;gl_FragColor=vec4(uColor*pow(vec3(intensity),vec3(uGamma)),1.0);return;}}}float nS=min(min(ph.x,ph.y),ph.z);vec3 sel=step(ph,vec3(nS));ph=ph-nS+st*sel;t+=nS;pos=mix(pos+ray*nS,floor(pos+ray*nS+0.5),sel);}gl_FragColor=vec4(0.0);}`;
  const cont=document.getElementById('snow-bg');
  const{OrthographicCamera,Scene,PlaneGeometry,Mesh,ShaderMaterial,WebGLRenderer,Vector2,Color,Vector3}=THREE;
  const rend=new WebGLRenderer({antialias:false,alpha:true,premultipliedAlpha:false,powerPreference:'high-performance',stencil:false,depth:false});
  rend.setPixelRatio(Math.min(window.devicePixelRatio,2));rend.setSize(window.innerWidth,window.innerHeight);rend.setClearColor(0,0);cont.appendChild(rend.domElement);
  const scene=new Scene(),cam=new OrthographicCamera(-1,1,1,-1,0,1);
  const col=new Color('#e8f0ff');
  const mat=new ShaderMaterial({vertexShader:vSh,fragmentShader:fSh,uniforms:{uTime:{value:0},uResolution:{value:new Vector2(window.innerWidth,window.innerHeight)},uFlakeSize:{value:.01},uMinFlakeSize:{value:1.25},uPixelResolution:{value:200},uSpeed:{value:1.25},uDepthFade:{value:8},uFarPlane:{value:20},uColor:{value:new Vector3(col.r,col.g,col.b)},uBrightness:{value:1},uGamma:{value:.4545},uDensity:{value:.3},uVariant:{value:0},uDirection:{value:125*Math.PI/180}},transparent:true});
  scene.add(new Mesh(new PlaneGeometry(2,2),mat));
  let rt;window.addEventListener('resize',()=>{clearTimeout(rt);rt=setTimeout(()=>{rend.setSize(window.innerWidth,window.innerHeight);mat.uniforms.uResolution.value.set(window.innerWidth,window.innerHeight);},100);});
  const t0=performance.now();(function loop(){requestAnimationFrame(loop);mat.uniforms.uTime.value=(performance.now()-t0)*.001;rend.render(scene,cam);})();
})();
